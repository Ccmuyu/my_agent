llm:
  provider: "openrouter"  # openrouter / ollama
  api_key: "${OPENROUTER_API_KEY}"
  model: "anthropic/claude-3.5-sonnet"
  base_url: "https://openrouter.ai/api/v1"
  temperature: 0.7
  max_tokens: 4096

perception:
  screenshot_dir: "/tmp/desktop-agent/screenshots"
  ocr_enabled: true

execution:
  max_retries: 3
  retry_delay_ms: 1000
  confirm_dangerous: true
  confirm_threshold: 5

browser:
  headless: false
  timeout_ms: 30000
  viewport:
    width: 1280
    height: 720

server:
  host: "0.0.0.0"
  port: 8000
